name: AbleSci Auto Sign

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  sign:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requests
        run: pip install requests

      - name: Run sign script
        env:
          COOKIE: ${{ secrets.COOKIE }}
        run: python sign.py
